name: Trigger Failure Alert
on: [push, workflow_dispatch]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Deployment
        run: echo "Initializing deployment pipeline..."

      - name: Force Failure
        run: |
          echo "Error: Critical database connection failure detected!"
          echo "Failing this run intentionally to trigger a PulseDev alert."
          exit 1 # <--- This forces the build to fail
